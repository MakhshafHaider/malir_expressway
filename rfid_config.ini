[gate]
; "entry" or "exit"
mode = entry

; UUID of this plaza — get from GET /api/v1/tolls/plazas/ (replace this placeholder)
plaza_id = 00000000-0000-0000-0000-000000000000

; UUID of this lane (optional — leave blank if not needed)
lane_id =

[api]
; Base URL of the Django backend reachable from this machine
base_url = http://192.168.78.68:8000

; JWT access token for an operator account
; Obtain via: POST /api/v1/auth/login/  { "phone": "...", "password": "..." }
operator_token = PASTE_OPERATOR_JWT_HERE

[display]
; IP of the local display device
display_ip = 192.168.78.72

[barrier]
; Serial port for the barrier controller
port = /dev/ttyUSB0
baudrate = 115200
; Seconds the barrier stays open before closing
open_seconds = 2.0

[scanner]
; RFID reader TCP address
reader_host = 192.168.78.8
reader_port = 9090
; Seconds before the same tag can trigger again
tag_cooldown = 5.0
